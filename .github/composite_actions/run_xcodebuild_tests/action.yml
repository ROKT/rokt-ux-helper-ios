name: Run unit tests
description: Action runs `xcodebuild test`

# The Xcode/simulator toolchain is configured entirely by the repository variables
# CI_XCODE_VERSION, CI_SIMULATOR_MODEL and CI_SIMULATOR_OS — the single source of
# truth. Change them in Settings → Secrets and variables → Actions → Variables to
# react to a GitHub runner-image change without opening a code PR.
#
# The `vars` context is NOT available inside a composite action, so these are not
# read here directly: the caller workflow (which can read `vars`) passes each repo
# variable through as the matching input below. The inputs are internal plumbing,
# not tunable knobs, and carry no defaults so the repo variables remain the only
# place a value is defined. Keep CI_SIMULATOR_OS aligned with the iOS runtime
# CI_XCODE_VERSION bundles (e.g. Xcode 26.2 → iOS 26.2).

inputs:
  codecov-token:
    description: Codecov token
    required: false
  xcode-version:
    description: Wired from repo variable CI_XCODE_VERSION by the caller workflow.
    required: true
  simulator-model:
    description: Wired from repo variable CI_SIMULATOR_MODEL by the caller workflow.
    required: true
  simulator-os:
    description: Wired from repo variable CI_SIMULATOR_OS by the caller workflow.
    required: true

runs:
  using: composite
  steps:
    - name: Set up Xcode
      uses: maxim-lobanov/setup-xcode@ed7a3b1fda3918c0306d1b724322adc0b8cc0a90 # v1
      with:
        xcode-version: ${{ inputs.xcode-version }}

    - name: Setup iOS Simulator
      uses: futureware-tech/simulator-action@dab10d813144ef59b48d401cd95da151222ef8cd # v4
      id: simulator
      with:
        model: ${{ inputs.simulator-model }}
        os: iOS
        # os_version is pinned to the iOS runtime bundled with the pinned Xcode
        # (Xcode 26.2 → iOS 26.2) so snapshot rendering is deterministic and the
        # runtime is guaranteed present on the image. A loose range (">=18.0") let the
        # action pick among whichever iOS runtimes the image happened to ship, which
        # broke exact-pixel snapshot references across point-release text rendering.
        # The value comes from repo variable CI_SIMULATOR_OS (resolved by the caller
        # workflow into the input below) so the image can be re-pointed without a code
        # change — but bumping the iOS version (or Xcode version) requires re-recording
        # snapshots.
        os_version: ${{ inputs.simulator-os }}
        wait_for_boot: true
        shutdown_after_job: true

    - name: Run unit tests
      env:
        TEST_RUNNER_SNAPSHOT_ARTIFACTS: ${{ github.workspace }}/snapshot-failures
      run: >
        set -o pipefail &&
        xcodebuild -skipPackagePluginValidation -scheme RoktUXHelper
        -destination 'id=${{ steps.simulator.outputs.udid }}'
        -enableCodeCoverage YES -derivedDataPath DerivedData clean build test
        | xcbeautify --renderer github-actions
      shell: bash

    - name: Upload snapshot failure diffs
      if: failure()
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
      with:
        name: snapshot-failures
        path: snapshot-failures/
        if-no-files-found: warn

    - name: Install xcresultparser
      if: ${{ inputs.codecov-token != '' }}
      run: brew install xcresultparser
      shell: bash

    - name: Process coverage report
      if: ${{ inputs.codecov-token != '' }}
      shell: bash
      run: |
        mkdir -p artifacts
        xcresultparser --output-format cobertura "$(find DerivedData/Logs/Test -name '*.xcresult' | head -n 1)" --project-root "$(pwd)" > "artifacts/coverage.xml"

    - name: Upload coverage report
      if: ${{ inputs.codecov-token != '' }}
      uses: codecov/codecov-action@75cd11691c0faa626561e295848008c8a7dddffe # v5
      with:
        token: ${{ inputs.codecov-token }}
        files: ./artifacts/coverage.xml
        flags: unittests
