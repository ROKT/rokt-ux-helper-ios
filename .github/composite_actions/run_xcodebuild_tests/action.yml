name: Run unit tests
description: Action runs `xcodebuild test` on xcode 16.x

inputs:
  codecov-token:
    description: Codecov token
    type: string
    required: false

runs:
  using: composite
  steps:
    - name: Set up Xcode 16
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: 26.2

    - name: Setup iOS Simulator
      uses: futureware-tech/simulator-action@v4
      id: simulator
      with:
        model: iPhone 16
        os: iOS
        os_version: ">=18.0"
        wait_for_boot: true
        shutdown_after_job: true

    - name: Build for testing
      run: >
        set -o pipefail &&
        xcodebuild build-for-testing -skipPackagePluginValidation -scheme RoktUXHelper
        -destination 'id=${{ steps.simulator.outputs.udid }}'
        -enableCodeCoverage YES -derivedDataPath DerivedData
        | xcbeautify --renderer github-actions
      shell: bash

    - name: Run unit tests
      env:
        TEST_RUNNER_SNAPSHOT_ARTIFACTS: ${{ github.workspace }}/snapshot-failures
      run: |
        mkdir -p "${{ github.workspace }}/snapshot-failures"
        set -o pipefail
        xcodebuild test-without-building \
          -xctestrun "$(find DerivedData/Build/Products -name '*.xctestrun' -print -quit)" \
          -destination 'id=${{ steps.simulator.outputs.udid }}' \
          -enableCodeCoverage YES -derivedDataPath DerivedData \
          | xcbeautify --renderer github-actions
      shell: bash

    - name: Upload snapshot failure diffs
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: snapshot-failures
        path: snapshot-failures/
        if-no-files-found: warn

    - name: Install xcresultparser
      if: ${{ inputs.codecov-token != '' }}
      run: brew install xcresultparser
      shell: bash

    - name: Process coverage report
      if: ${{ inputs.codecov-token != '' }}
      shell: bash
      run: |
        mkdir -p artifacts
        xcresultparser --output-format cobertura "$(find DerivedData/Logs/Test -name '*.xcresult' | head -n 1)" --project-root "$(pwd)" > "artifacts/coverage.xml"

    - name: Upload coverage report
      if: ${{ inputs.codecov-token != '' }}
      uses: codecov/codecov-action@v5
      with:
        token: ${{ inputs.codecov-token }}
        files: ./artifacts/coverage.xml
        flags: unittests
