name: Run unit tests
description: Action runs `xcodebuild test`

# The Xcode/simulator toolchain is driven by repository variables (with in-repo
# defaults, so nothing breaks if they are unset). Update them in
# Settings → Secrets and variables → Actions → Variables to react to a GitHub
# runner-image change without opening a code PR:
#   CI_XCODE_VERSION   (default 26.2)      — Xcode selected by setup-xcode
#   CI_SIMULATOR_MODEL (default iPhone 17) — simulator device model
#   CI_SIMULATOR_OS    (default 26.2)      — simulator iOS runtime
# Keep CI_SIMULATOR_OS aligned with the iOS runtime CI_XCODE_VERSION bundles
# (e.g. Xcode 26.2 → iOS 26.2).

inputs:
  codecov-token:
    description: Codecov token
    required: false

runs:
  using: composite
  steps:
    - name: Set up Xcode
      uses: maxim-lobanov/setup-xcode@ed7a3b1fda3918c0306d1b724322adc0b8cc0a90 # v1
      with:
        xcode-version: ${{ vars.CI_XCODE_VERSION || '26.2' }}

    - name: Setup iOS Simulator
      uses: futureware-tech/simulator-action@dab10d813144ef59b48d401cd95da151222ef8cd # v4
      id: simulator
      with:
        model: ${{ vars.CI_SIMULATOR_MODEL || 'iPhone 17' }}
        os: iOS
        # os_version is pinned to the iOS runtime bundled with the pinned Xcode
        # (Xcode 26.2 → iOS 26.2) so snapshot rendering is deterministic and the
        # runtime is guaranteed present on the image. A loose range (">=18.0") let the
        # action pick among whichever iOS runtimes the image happened to ship, which
        # broke exact-pixel snapshot references across point-release text rendering.
        # The value comes from repo variable CI_SIMULATOR_OS (defaulting to the value
        # below) so the image can be re-pointed without a code change — but bumping the
        # iOS version (or the Xcode version) requires re-recording snapshots.
        os_version: ${{ vars.CI_SIMULATOR_OS || '26.2' }}
        wait_for_boot: true
        shutdown_after_job: true

    - name: Run unit tests
      env:
        TEST_RUNNER_SNAPSHOT_ARTIFACTS: ${{ github.workspace }}/snapshot-failures
      run: >
        set -o pipefail &&
        xcodebuild -skipPackagePluginValidation -scheme RoktUXHelper
        -destination 'id=${{ steps.simulator.outputs.udid }}'
        -enableCodeCoverage YES -derivedDataPath DerivedData clean build test
        | xcbeautify --renderer github-actions
      shell: bash

    - name: Upload snapshot failure diffs
      if: failure()
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
      with:
        name: snapshot-failures
        path: snapshot-failures/
        if-no-files-found: warn

    - name: Install xcresultparser
      if: ${{ inputs.codecov-token != '' }}
      run: brew install xcresultparser
      shell: bash

    - name: Process coverage report
      if: ${{ inputs.codecov-token != '' }}
      shell: bash
      run: |
        mkdir -p artifacts
        xcresultparser --output-format cobertura "$(find DerivedData/Logs/Test -name '*.xcresult' | head -n 1)" --project-root "$(pwd)" > "artifacts/coverage.xml"

    - name: Upload coverage report
      if: ${{ inputs.codecov-token != '' }}
      uses: codecov/codecov-action@75cd11691c0faa626561e295848008c8a7dddffe # v5
      with:
        token: ${{ inputs.codecov-token }}
        files: ./artifacts/coverage.xml
        flags: unittests
